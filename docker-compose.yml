version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: avarith_db
    environment:
      POSTGRES_USER: avarith_user
      POSTGRES_PASSWORD: Qp7#Km9$Lx2@Vn4!
      POSTGRES_DB: avarith
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U avarith_user -d avarith"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - avarith_net

  redis:
    image: redis:7-alpine
    container_name: avarith_redis
    command: redis-server --requirepass R3d!s@P@ssw0rd --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - avarith_net

  backend:
    build: ./server
    container_name: avarith_backend
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=avarith
      - DB_USER=avarith_user
      - DB_PASSWORD=Qp7#Km9$Lx2@Vn4!
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=R3d!s@P@ssw0rd
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - avarith_net

  nginx:
    image: nginx:alpine
    container_name: avarith_nginx
    volumes:
      - ./client:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - avarith_net

volumes:
  pgdata:
  redisdata:

networks:
  avarith_net:
    driver: bridge